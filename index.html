<style>
  body { margin: 0; background: #111; color: #0ef; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
  #game-wrap { position: relative; width: 300px; height: 450px; border: 3px solid #0ef; background: #000; overflow: hidden; box-shadow: 0 0 20px #0ef4; }
  canvas { display: block; }
  #ui-layer { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; pointer-events: none; z-index: 10; }
  #menu, #shop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  #shop { display: none; padding-top: 20px; }
  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
  button { width: 180px; margin: 5px; padding: 12px; border: 2px solid #0ef; background: transparent; color: #0ef; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; }
  button:active { background: #0ef; color: #000; }
  .shop-item { width: 80px; height: 80px; border: 2px solid #444; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; border-radius: 8px; }
  .shop-item.owned { border-color: #0ef; }
  .shop-item.selected { background: #0ef2; border-color: #0ef; box-shadow: inset 0 0 10px #0ef; }
  #secret-btn { position: absolute; bottom: 5px; right: 5px; opacity: 0.2; background: none; border: none; color: white; }
</style>

<div id="game-wrap">
  <div id="ui-layer">
    <div id="s">SCORE: 0</div>
    <div id="c-display">💰: 0</div>
  </div>

  <div id="menu">
    <h2 style="margin-bottom:20px">NEON RACER</h2>
    <button onclick="start('easy')">EASY</button>
    <button onclick="start('medium')">MEDIUM</button>
    <button onclick="start('hard')">HARD</button>
    <button style="border-color:#f0a" onclick="openShop()">🛒 SHOP</button>
    <button id="secret-btn" onclick="checkCode()">🤫</button>
  </div>

  <div id="shop">
    <h3>GARAGE</h3>
    <div id="coin-count" style="color: gold; margin-bottom: 10px;">COINS: 0</div>
    <div class="btn-grid" id="shop-items">
      </div>
    <button style="margin-top:20px; border-color:#fff; color:#fff" onclick="closeShop()">BACK</button>
  </div>

  <canvas id="g"></canvas>
</div>

<script>
  const c = document.getElementById('g'), x = c.getContext('2d'), sE = document.getElementById('s'), 
        cE = document.getElementById('c-display'), menu = document.getElementById('menu'), 
        shopUI = document.getElementById('shop'), wrap = document.getElementById('game-wrap');
  
  c.width = 300; c.height = 450;
  
  // Game State & Persistence
  let score = 0, pX = 130, pVel = 0, move = 0, enemies = [], speed = 4, active = false, partyMode = false;
  let coins = parseInt(localStorage.getItem('coins')) || 0;
  let ownedSkins = JSON.parse(localStorage.getItem('ownedSkins')) || ['🏎️'];
  let currentSkin = localStorage.getItem('currentSkin') || '🏎️';

  const inventory = [
    { emoji: '🏎️', cost: 0 },
    { emoji: '🛸', cost: 50 },
    { emoji: '🛹', cost: 20 },
    { emoji: '🐉', cost: 100 },
    { emoji: '🚀', cost: 150 },
    { emoji: '🍕', cost: 300 }
  ];

  function updateUI() {
    cE.innerHTML = `💰: ${coins}`;
    document.getElementById('coin-count').innerHTML = `YOUR COINS: ${coins}`;
    renderShop();
  }

  function renderShop() {
    const container = document.getElementById('shop-items');
    container.innerHTML = '';
    inventory.forEach(item => {
      const div = document.createElement('div');
      const isOwned = ownedSkins.includes(item.emoji);
      div.className = `shop-item ${isOwned ? 'owned' : ''} ${currentSkin === item.emoji ? 'selected' : ''}`;
      div.innerHTML = `<div>${item.emoji}</div><div style="font-size:10px">${isOwned ? 'OWNED' : '💰'+item.cost}</div>`;
      div.onclick = () => buyOrSelect(item);
      container.appendChild(div);
    });
  }

  function buyOrSelect(item) {
    if (ownedSkins.includes(item.emoji)) {
      currentSkin = item.emoji;
    } else if (coins >= item.cost) {
      coins -= item.cost;
      ownedSkins.push(item.emoji);
      currentSkin = item.emoji;
    } else {
      alert("Not enough coins!");
    }
    save();
    updateUI();
  }

  function save() {
    localStorage.setItem('coins', coins);
    localStorage.setItem('ownedSkins', JSON.stringify(ownedSkins));
    localStorage.setItem('currentSkin', currentSkin);
  }

  function openShop() { menu.style.display = 'none'; shopUI.style.display = 'flex'; updateUI(); }
  function closeShop() { shopUI.style.display = 'none'; menu.style.display = 'flex'; }

  function checkCode() {
    let input = prompt("Enter Secret Code:");
    if(input === "1234") { partyMode = true; coins += 1000; updateUI(); alert("RICH & INVINCIBLE!"); }
  }

  function start(mode) {
    active = true; menu.style.display = 'none'; shopUI.style.display = 'none';
    score = 0; enemies = []; pX = 130; pVel = 0;
    speed = mode === 'easy' ? 3 : mode === 'medium' ? 5 : mode === 'hard' ? 8 : 11;
    sE.innerHTML = "SCORE: 0";
    draw();
  }

  window.ontouchstart = (e) => { const tX = e.touches[0].clientX - c.getBoundingClientRect().left; move = tX < 150 ? -1 : 1; };
  window.ontouchend = () => move = 0;
  window.onkeydown = (e) => { if(e.key === "ArrowLeft") move = -1; if(e.key === "ArrowRight") move = 1; };
  window.onkeyup = () => move = 0;

  function draw() {
    if(!active) return;
    x.fillStyle = partyMode ? `hsla(${Date.now()%360}, 80%, 10%, 0.3)` : 'rgba(0,0,0,0.4)';
    x.fillRect(0,0,300,450);
    
    pVel = (pVel + move * 0.8) * 0.85;
    pX = Math.max(0, Math.min(260, pX + pVel));
    x.font = "40px Arial";
    x.fillText(currentSkin, pX, 420);

    if(Math.random() < 0.05) enemies.push({x: Math.random()*260, y: -40});

    for (let i = enemies.length - 1; i >= 0; i--) {
      let e = enemies[i];
      e.y += speed;
      x.fillText(partyMode ? "🥳" : "📦", e.x, e.y);

      if(!partyMode && e.y > 390 && e.y < 430 && e.x < pX+30 && e.x+30 > pX) {
        active = false;
        // Logic: Give 1 coin per 5 points scored
        const earned = Math.floor(score / 5);
        coins += earned;
        save();
        setTimeout(() => {
          alert(`CRASHED!\nScore: ${score}\nCoins Earned: ${earned}`);
          menu.style.display = 'flex';
          partyMode = false;
        }, 10);
      }
      
      if(e.y > 450) { 
        enemies.splice(i,1); 
        score++; 
        sE.innerHTML = "SCORE: " + score;
        speed += 0.01;
      }
    }
    requestAnimationFrame(draw);
  }
  updateUI(); // Init UI on load
</script>
